<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>FieldOps — Work Orders</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="logo-icon"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h4v-5h6v5h4V7z" stroke-linejoin="round"/></svg></div>FieldOps</div>
    <p class="login-sub">Public Works &amp; Parks work orders</p>
    <input id="loginEmail" class="form-control" type="email" placeholder="Email" autocomplete="username">
    <input id="loginPass" class="form-control" type="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn" class="action-btn btn-primary" style="width:100%">Sign in</button>
    <p id="loginErr" class="login-err"></p>
  </div>
</div>

<!-- APP (hidden until logged in) -->
<div id="app" style="display:none">
  <nav class="topnav">
    <div class="logo"><div class="logo-icon"><svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h4v-5h6v5h4V7z" stroke-linejoin="round"/></svg></div>FieldOps</div>
    <div class="nav-tabs" id="navTabs"></div>
    <button class="new-btn" id="newBtn"><svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke-linecap="round"/></svg><span class="nb-label">New</span></button>
    <button class="icon-btn" id="signOutBtn" title="Sign out"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 3H5a2 2 0 00-2 2v10a2 2 0 002 2h8M9 10h9m0 0l-3-3m3 3l-3 3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </nav>

  <div class="stats-bar" id="statsBar"></div>

  <!-- MAP VIEW -->
  <div class="main" id="mainView">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="search-bar"><svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14" stroke-linecap="round"/></svg>
          <input type="text" placeholder="Search work orders…" id="searchInput"></div>
        <div class="filter-row" id="filterRow"></div>
      </div>
      <div class="wo-list" id="woList"></div>
    </div>
    <div class="map-area">
      <div id="map"></div>
      <div class="map-controls">
        <button class="map-btn" id="zoomIn"><svg viewBox="0 0 20 20" fill="none"><path d="M10 6v8M6 10h8" stroke-linecap="round"/></svg></button>
        <button class="map-btn" id="zoomOut"><svg viewBox="0 0 20 20" fill="none"><path d="M6 10h8" stroke-linecap="round"/></svg></button>
        <button class="map-btn" id="fitAll"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="12" y="3" width="5" height="5" rx="1"/><rect x="3" y="12" width="5" height="5" rx="1"/><rect x="12" y="12" width="5" height="5" rx="1"/></svg></button>
        <button class="map-btn" id="cityGis" title="Open City of Troy GIS map"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3L1 6v13l6-3 6 3 6-3V3l-6 3-6-3z"/><path d="M7 3v13M13 6v13"/></svg></button>
      </div>
      <div class="draw-toolbar" id="drawToolbar">
        <button class="draw-btn" data-draw="hydrant" title="Add hydrant">🔥<span>Hydrant</span></button>
        <button class="draw-btn" data-draw="manhole" title="Add manhole">⚫<span>Manhole</span></button>
        <button class="draw-btn" data-draw="water" title="Trace water line">💧<span>Water line</span></button>
        <button class="draw-btn" data-draw="sewer" title="Trace sewer line">🟢<span>Sewer line</span></button>
      </div>
      <div class="draw-banner" id="drawBanner"></div>
      <div class="map-legend">
        <div class="legend-row"><div class="legend-dot" style="background:#0891b2"></div>Water</div>
        <div class="legend-row"><div class="legend-dot" style="background:#16a34a"></div>Sewer</div>
        <div class="legend-row"><div class="legend-dot" style="background:#dc2626"></div>Urgent / Hydrant</div>
        <div class="legend-row"><div class="legend-dot" style="background:#7c3aed"></div>Valve</div>
        <div class="legend-row"><div class="legend-dot" style="background:#374151"></div>Manhole</div>
      </div>
      <div class="detail-panel" id="detailPanel"><div class="detail-grab" id="detailGrab"><div class="detail-drag"></div><span class="detail-grab-label">Tap to close</span></div><div class="detail-content" id="detailContent"></div></div>
    </div>
  </div>

  <!-- OTHER PAGES render here -->
  <div id="pageView" class="page" style="display:none"><div class="page-inner" id="pageContent"></div></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"></div></div>
<div class="modal-overlay" id="lineModal"><div class="modal" id="lineBox"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="app.js"></script>
</body>
</html>
